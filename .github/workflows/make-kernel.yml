name: Build K40 Pro Kernel with SukiSU

on:
  push:
  workflow_dispatch:
    inputs:
      release:
        description: "Create release with artifacts"
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read config
        id: config
        run: |
          grep -E '^(KERNEL_SOURCE|KERNEL_SOURCE_BRANCH|KERNEL_CONFIG|ARCH|KERNEL_IMAGE_NAME)=' config.properties >> $GITHUB_ENV
          grep -E '^(KERNELSU_INSTALLER|KERNELSU_TAG|ENABLE_KERNELSU)=' config.properties >> $GITHUB_ENV
          echo "BUILD_TIME=$(TZ=Asia/Shanghai date '+%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Setup build environment
        run: |
          sudo apt update -qq
          sudo apt install -y -qq git ccache flex bison gperf build-essential zip \
            curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev liblz4-tool \
            make libssl-dev bc libc6-dev-i386 lib32ncurses5-dev xsltproc unzip \
            device-tree-compiler
          sudo apt upgrade -qq
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace

      - name: Setup swap (10GB)
        uses: pierotofy/set-swap-space@v1
        with:
          swap-size-gb: 10

      - name: Download Clang
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          mkdir -p clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r450784e.tar.gz
          tar -C clang/ -zxf clang-r450784e.tar.gz
          rm clang-r450784e.tar.gz
          echo "CLANG_PATH=$GITHUB_WORKSPACE/kernel_workspace/clang/bin" >> $GITHUB_ENV
        continue-on-error: true

      - name: Download GCC
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          mkdir -p gcc-arm64 gcc-arm32
          wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/master.tar.gz
          tar -C gcc-arm64/ -zxf master.tar.gz
          rm master.tar.gz
          wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/master.tar.gz
          tar -C gcc-arm32/ -zxf master.tar.gz
          rm master.tar.gz
        continue-on-error: true

      - name: Clone kernel source
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel

      - name: Apply SukiSU-Ultra
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          curl -LSs "${{ env.KERNELSU_INSTALLER }}" | bash -s ${{ env.KERNELSU_TAG }}

      - name: Setup kernel config
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          # Fix defconfig for KSU
          CONFIG_FILE=arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
          echo "CONFIG_MODULES=y" >> $CONFIG_FILE
          echo "CONFIG_KPROBES=y" >> $CONFIG_FILE
          echo "CONFIG_HAVE_KPROBES=y" >> $CONFIG_FILE
          echo "CONFIG_KPROBE_EVENTS=y" >> $CONFIG_FILE
          echo "CONFIG_OVERLAY_FS=y" >> $CONFIG_FILE
          # Fix for clang 12+
          sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/' $CONFIG_FILE 2>/dev/null || true
          sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_CLANG=n/' $CONFIG_FILE 2>/dev/null || true
          echo "CONFIG_LTO_NONE=y" >> $CONFIG_FILE
          echo "CONFIG_CC_WERROR=n" >> $CONFIG_FILE

      - name: Build kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          export PATH=${{ env.CLANG_PATH }}:$PATH
          export ARCH=${{ env.ARCH }}
          make O=out ${{ env.KERNEL_CONFIG }}
          make -j$(nproc) O=out \
            CC=clang \
            CROSS_COMPILE=$GITHUB_WORKSPACE/kernel_workspace/gcc-arm64/bin/aarch64-linux-android- \
            CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/kernel_workspace/gcc-arm32/bin/arm-linux-androideabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1

      - name: Check build result
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          ls -lh out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}
          file out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}

      - name: Package AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' AnyKernel3/anykernel.sh
          sed -i 's!block=.*!block=auto;!' AnyKernel3/anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' AnyKernel3/anykernel.sh
          cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/
          cd AnyKernel3
          zip -r AnyKernel3-K40Pro-SukiSU-${{ env.BUILD_TIME }}.zip . -x ".git*" "README.md" "*.zip"
          cp *.zip $GITHUB_WORKSPACE/

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-K40Pro-SukiSU-${{ env.BUILD_TIME }}
          path: "*.zip"

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_IMAGE_NAME }}-K40Pro-SukiSU-${{ env.BUILD_TIME }}
          path: kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}

      - name: Create release
        if: github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: K40Pro-SukiSU-${{ env.BUILD_TIME }}
          draft: false
          prerelease: false
          files: |
            *.zip
            kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}
