# ===== 内核源码 (K40 Pro haydn) =====
KERNEL_SOURCE=https://github.com/PixelExperience-Devices/kernel_xiaomi_haydn
KERNEL_SOURCE_BRANCH=twelve
KERNEL_CONFIG=vendor/haydn-qgki_defconfig
ARCH=arm64
KERNEL_IMAGE_NAME=Image

# ===== 编译器 =====
ENABLE_CLANG=true
USE_AOSP_CLANG=true
AOSP_CLANG_SYSTEM=linux-x86
AOSP_CLANG_VERSION=r450784e

# ===== GCC =====
ENABLE_GCC=true
ENABLE_AOSP_GCC_ARM64=true
ENABLE_AOSP_GCC_ARM32=true

# ===== SukiSU-Ultra (非GKI) =====
ENABLE_KERNELSU=true
KERNELSU_INSTALLER=https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh
KERNELSU_TAG=nongki

# ===== 内核配置 =====
ADD_KPROBES_CONFIG=true
ADD_OVERLAYFS_CONFIG=true

# ===== 编译选项 =====
DISABLE_LTO=true
DISABLE_CC_WERROR=true

# ===== AnyKernel3 =====
BUILD_BOOT_IMG=false
ENABLE_CCACHE=false
